name: build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pack:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: choco pack
        shell: pwsh
        run: choco pack go-core.nuspec --no-progress

      - uses: actions/upload-artifact@v4
        with:
          name: go-core-nupkg
          path: '*.nupkg'
          if-no-files-found: error
