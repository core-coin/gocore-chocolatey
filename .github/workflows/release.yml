name: release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: choco pack
        shell: pwsh
        run: choco pack go-core.nuspec --no-progress

      - name: choco push
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $nupkg = Get-ChildItem -Filter *.nupkg | Select-Object -First 1
          if (-not $nupkg) { throw 'choco pack produced no .nupkg' }
          choco apikey --key "$env:CHOCO_API_KEY" --source https://push.chocolatey.org/
          choco push $nupkg.FullName --source https://push.chocolatey.org/
